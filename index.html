<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日治臺灣：時光探險隊</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Zen+Maru+Gothic:wght@500;900&display=swap" rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Firebase SDKs (Compat version for better browser compatibility) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f0f4f8;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .title-font {
            font-family: 'Zen Maru Gothic', sans-serif;
        }
        .flip-card {
            background-color: transparent;
            perspective: 1000px;
        }
        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }
        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 1rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .flip-card-back {
            transform: rotateY(180deg);
        }
        .retro-btn {
            box-shadow: 4px 4px 0px 0px #1e293b;
            transition: all 0.1s;
        }
        .retro-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px 0px #1e293b;
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #888; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555; 
        }
        
        /* 記憶法發光特效 */
        .memory-glow {
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { box-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 15px #fde047, 0 0 20px #fde047; }
            to { box-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #eab308, 0 0 40px #eab308; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- System Initialization ---
        
        // 已填入老師提供的 Google Apps Script 網址
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxnjrrQ87Kiq6EAJbdVQgTM4fgJqop2AjlLF8G07ofY_5c5Vy9opPEoIiaLkKlROfOFwQ/exec'; 

        let auth, db;
        let isOfflineMode = false;
        const appId = typeof window.__app_id !== 'undefined' ? window.__app_id : 'default-app-id';
        const initialAuthToken = window.__initial_auth_token;

        // 檢查是否有 Firebase 設定
        const hasFirebaseConfig = window.__firebase_config && window.__firebase_config.length > 0;

        if (hasFirebaseConfig) {
            try {
                const firebaseConfig = JSON.parse(window.__firebase_config);
                if (!firebase.apps.length) {
                    firebase.initializeApp(firebaseConfig);
                }
                auth = firebase.auth();
                db = firebase.firestore();
            } catch (e) {
                console.error("Firebase Init Failed, falling back to offline mode", e);
                isOfflineMode = true;
            }
        } else {
            console.warn("No Firebase config found. Running in Offline Mode.");
            isOfflineMode = true;
        }

        // --- Mock Objects for Offline Mode (Local Storage Logic) ---
        if (isOfflineMode) {
            // 模擬 Auth
            auth = {
                signInAnonymously: async () => ({ user: { uid: 'offline_user_' + Date.now() } }),
                signInWithCustomToken: async () => ({ user: { uid: 'offline_user' } }),
                onAuthStateChanged: (callback) => {
                    callback({ uid: 'offline_guest', isAnonymous: true });
                    return () => {};
                },
                currentUser: { uid: 'offline_guest' }
            };

            // 模擬 Firestore (使用 LocalStorage)
            const LOCAL_STORAGE_KEY = 'history_learning_scores';
            
            const createMockChain = () => {
                return {
                    collection: () => createMockChain(),
                    doc: () => createMockChain(),
                    add: async (data) => {
                        const existingData = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY) || '[]');
                        const newDoc = {
                            ...data,
                            id: 'local_' + Date.now(),
                            date: { seconds: Date.now() / 1000 }
                        };
                        existingData.push(newDoc);
                        localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(existingData));
                        return { id: newDoc.id };
                    },
                    orderBy: (field, direction) => {
                        return {
                            onSnapshot: (callback) => {
                                const existingData = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY) || '[]');
                                existingData.sort((a, b) => b[field] - a[field]);
                                const snapshot = {
                                    docs: existingData.map(d => ({
                                        id: d.id,
                                        data: () => d
                                    }))
                                };
                                callback(snapshot);
                                return () => {};
                            }
                        };
                    }
                };
            };
            db = createMockChain();
        }

        // --- Utils: Sound Effect ---
        const playAudio = (type) => {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                
                const ctx = new AudioContext();
                const oscillator = ctx.createOscillator();
                const gainNode = ctx.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(ctx.destination);
                
                if (type === 'correct') {
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(660, ctx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.1);
                    gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
                    oscillator.start();
                    oscillator.stop(ctx.currentTime + 0.5);
                } else {
                    oscillator.type = 'sawtooth';
                    oscillator.frequency.setValueAtTime(150, ctx.currentTime);
                    oscillator.frequency.linearRampToValueAtTime(100, ctx.currentTime + 0.3);
                    gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    oscillator.start();
                    oscillator.stop(ctx.currentTime + 0.3);
                }
            } catch (e) {
                console.error("Audio play failed", e);
            }
        };

        // --- Data (新增考卷魔王題) ---
        const quizQuestions = [
            { id: 1, type: 'tf', q: '西元 1895 年，清帝國與日本簽訂馬關條約，將臺灣割讓給日本。', a: true, expl: '正確！這是日治時期的開始。' },
            { id: 2, type: 'tf', q: '日治時期，警察只負責抓壞人，不參與衛生與行政管理。', a: false, expl: '錯誤！當時警察「無所不管」，連衛生檢查、戶口調查都要管。' },
            { id: 3, type: 'tf', q: '「第一憨，種甘蔗給糖廠磅」是形容當時糖廠收購甘蔗的制度不公平。', a: true, expl: '正確！因為秤重權在糖廠，農民常覺得被偷斤減兩。' },
            { id: 4, type: 'tf', q: '八田與一被譽為「嘉南大圳之父」，對臺灣農業貢獻很大。', a: true, expl: '正確！嘉南大圳讓許多旱田變成了良田，提高了稻米和甘蔗產量。' },
            { id: 5, type: 'tf', q: '當時臺灣兒童與日本兒童在同一種學校讀書，完全沒有差別待遇。', a: false, expl: '錯誤！日本人讀「小學校」，臺灣人讀「公學校」，資源有差。' },
            { id: 6, type: 'tf', q: '日治時期引入了星期制，讓民眾開始有了「週休」的概念。', a: true, expl: '正確！這是現代時間觀念的建立。' },
            { id: 7, type: 'tf', q: '蔣渭水醫師創立大安醫院，除了醫病，更想透過社會運動「醫國」。', a: true, expl: '正確！他是臺灣文化協會的重要推手。' },
            { id: 8, type: 'tf', q: '「皇民化運動」是鼓勵臺灣人保留原本的傳統習俗，不需學日語。', a: false, expl: '錯誤！皇民化運動要求說日語、改日本姓名、拜日本神社。' },
            { id: 9, type: 'tf', q: '西元 1935 年，臺灣舉行了史上第一次部分民意代表的選舉。', a: true, expl: '正確！這是臺灣選舉史的開端。' },
            { id: 10, type: 'tf', q: '透過建立公共衛生系統與自來水，日治時期人們的壽命有顯著延長。', a: true, expl: '正確！衛生改善前平均壽命不到30歲，改善後傳染病大幅減少。' },
            { id: 11, type: 'mc', q: '日本在臺灣設立的最高統治機關為何？', options: ['總統府', '臺灣總督府', '臺灣巡撫衙門'], a: 1, expl: '就是現在位於臺北凱達格蘭大道上的總統府建築喔！' },
            { id: 12, type: 'mc', q: '下列何者不是當時的專賣品？', options: ['鹽', '酒', '稻米'], a: 2, expl: '稻米不是專賣品，但菸、酒、鹽、樟腦、鴉片是。' },
            { id: 13, type: 'mc', q: '由莫那．魯道領導的武裝抗日事件是？', options: ['霧社事件', '噍吧哖事件', '牡丹社事件'], a: 0, expl: '發生在南投霧社，是原住民反抗日本統治不尊重與欺壓的重要事件。' },
            { id: 14, type: 'mc', q: '日治時期為了運送阿里山木材而興建的鐵路是？', options: ['西部縱貫鐵路', '阿里山森林鐵路', '糖業鐵路'], a: 1, expl: '現在是知名的觀光鐵路，當時是為了運送珍貴檜木。' },
            { id: 15, type: 'mc', q: '蔣渭水成立的哪一個組織，被視為啟蒙臺灣文化的關鍵？', options: ['臺灣民主國', '專賣局', '臺灣文化協會'], a: 2, expl: '文協透過演講、辦報紙、演文化劇來啟發民眾智慧。' },
            { id: 16, type: 'mc', q: '下列哪一項是日治時期引進的現代文明事物？', options: ['一天 24 小時制', '農曆新年', '纏足習俗'], a: 0, expl: '車站掛起大時鐘，人們開始看手錶赴約，引進星期與24小時制。' },
            { id: 17, type: 'mc', q: '在皇民化運動中，被認定為「國語家庭」的人可以享有什麼優待？', options: ['免繳稅', '分配較多物資', '不必工作'], a: 1, expl: '因為物資缺乏，成為國語(日語)家庭可以有配給優待。' },
            { id: 18, type: 'mc', q: '關於基隆港與高雄港的敘述，何者正確？', options: ['是為了開發東部', '主要是為了觀光', '奠定了日後航運與貿易的基礎'], a: 2, expl: '一北一南的港口，打通了臺灣對外的運輸動脈。' },
            { id: 19, type: 'mc', q: '臺灣第一位原住民族西醫，且在臺東開辦醫院的人是？', options: ['南志信', '蔣渭水', '蔡培火'], a: 0, expl: '南志信醫師是卑南族人，致力於改善原鄉醫療。' },
            { id: 20, type: 'mc', q: '臺灣文化協會透過哪一份報紙作為傳播新知的主要工具？', options: ['聯合報', '臺灣民報', '中國時報'], a: 1, expl: '《臺灣民報》是當時臺灣人唯一的言論機關，對總督府政策提出批評。' },
            // 新增：從考卷提煉的魔王題
            { id: 21, type: 'mc', q: '【考卷魔王題】關於「臺灣議會設置請願運動」與「臺灣文化協會」，下列哪一項是屬於「臺灣文化協會」的行動？', options: ['向日本國會提出請願', '發行臺灣民報與演出文化劇', '要求總督府開放所有選舉權'], a: 1, expl: '議會請願是政治面的「向國會請願」；文化協會是文化面的「辦報紙、演講、演文化劇」。' },
            { id: 22, type: 'tf', q: '【考卷魔王題】隨著中日戰爭爆發，許多臺灣青年被派往中國大陸或東南亞為日本作戰，造成嚴重的傷亡。', a: true, expl: '正確！當時臺灣人也被徵召成為軍伕或軍人去前線打仗。' },
            { id: 23, type: 'tf', q: '【考卷魔王題】在日治時期，當發生戰爭需要防空演習時，學校老師會指導學生如何進行避難。', a: true, expl: '正確！戰爭影響了校園生活，防空演習成為當時學生的日常。' },
            { id: 24, type: 'tf', q: '【考卷魔王題】日治時期雖然建立了現代教育制度讓識字率提升，但是臺灣人讀的學校跟日本人讀的學校擁有完全一樣的師資與設備。', a: false, expl: '錯誤！口訣：臺「公」日「小」。日本人讀的「小學校」師資設備較好，且主要學習日本地理文化。' }
        ];

        // --- Components ---

        const Highlight = ({ children }) => (
            <span className="inline-block bg-yellow-300 text-blue-900 px-1 rounded font-black border-b-4 border-yellow-500 mx-0.5 transform -skew-x-6 text-base">
                {children}
            </span>
        );

        // 超強記憶法元件 (新增)
        const SuperMemoryBanner = () => {
            return (
                <div className="mb-10 bg-gradient-to-br from-blue-900 via-indigo-900 to-purple-900 rounded-3xl p-6 shadow-2xl border-4 border-yellow-400 relative overflow-hidden">
                    {/* 裝飾背景 */}
                    <div className="absolute top-0 right-0 -mr-10 -mt-10 text-white/10">
                        <i data-lucide="brain" className="w-48 h-48"></i>
                    </div>
                    
                    <div className="relative z-10">
                        <div className="flex items-center gap-3 mb-6">
                            <span className="text-4xl">🔥</span>
                            <h2 className="text-3xl font-black text-yellow-400 title-font tracking-wide drop-shadow-md">
                                考前大補丸：超強記憶秘笈
                            </h2>
                            <span className="text-xs bg-red-500 text-white px-2 py-1 rounded-full font-bold animate-pulse">
                                必考大魔王
                            </span>
                        </div>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            {/* 記憶點 1 */}
                            <div className="bg-white/10 backdrop-blur-sm p-4 rounded-2xl border border-white/20 hover:bg-white/20 transition-all">
                                <h3 className="text-xl font-bold text-blue-200 mb-2 flex items-center gap-2">
                                    🏫 學校分開讀
                                </h3>
                                <div className="bg-yellow-400 text-blue-900 font-black p-3 rounded-xl text-lg mb-2 shadow-inner transform -rotate-1">
                                    口訣：臺「公」日「小」不公平
                                </div>
                                <p className="text-gray-200 text-sm leading-relaxed">
                                    臺灣人讀<span className="text-yellow-300 font-bold">公學校</span>，日本人讀<span className="text-yellow-300 font-bold">小學校</span>。日本人的師資設備較好，還得學日本地理與文化，有差別待遇。
                                </p>
                            </div>

                            {/* 記憶點 2 */}
                            <div className="bg-white/10 backdrop-blur-sm p-4 rounded-2xl border border-white/20 hover:bg-white/20 transition-all">
                                <h3 className="text-xl font-bold text-green-200 mb-2 flex items-center gap-2">
                                    📢 社會運動分兩路
                                </h3>
                                <div className="bg-green-400 text-green-900 font-black p-3 rounded-xl text-lg mb-2 shadow-inner transform rotate-1">
                                    口訣：議會找國會，文協辦民報
                                </div>
                                <p className="text-gray-200 text-sm leading-relaxed">
                                    <span className="text-green-300 font-bold">臺灣議會請願</span>👉向日本國會要求政治權利。<br/>
                                    <span className="text-green-300 font-bold">臺灣文化協會</span>👉辦演講、發《臺灣民報》、演文化劇破除迷信啟民智。
                                </p>
                            </div>

                            {/* 記憶點 3 */}
                            <div className="bg-white/10 backdrop-blur-sm p-4 rounded-2xl border border-white/20 hover:bg-white/20 transition-all">
                                <h3 className="text-xl font-bold text-orange-200 mb-2 flex items-center gap-2">
                                    💣 戰爭的影響
                                </h3>
                                <div className="bg-orange-400 text-orange-900 font-black p-3 rounded-xl text-lg mb-2 shadow-inner transform -rotate-1">
                                    口訣：躲空襲、去南洋
                                </div>
                                <p className="text-gray-200 text-sm leading-relaxed">
                                    中日戰爭爆發後，學校老師要指導學生<span className="text-orange-300 font-bold">防空演習</span>；臺灣青年則被迫派往中國或東南亞<span className="text-orange-300 font-bold">當兵作戰</span>，傷亡慘重。
                                </p>
                            </div>

                            {/* 記憶點 4 */}
                            <div className="bg-white/10 backdrop-blur-sm p-4 rounded-2xl border border-white/20 hover:bg-white/20 transition-all">
                                <h3 className="text-xl font-bold text-pink-200 mb-2 flex items-center gap-2">
                                    ⏰ 現代化生活
                                </h3>
                                <div className="bg-pink-400 text-pink-900 font-black p-3 rounded-xl text-lg mb-2 shadow-inner transform rotate-1">
                                    口訣：看鐘錶、休週日、喝水道水
                                </div>
                                <p className="text-gray-200 text-sm leading-relaxed">
                                    車站掛大時鐘提醒準時，引進<span className="text-pink-300 font-bold">24小時與星期制</span>。公共衛生改善(自來水/水道水)，傳染病減少，平均壽命從不到30歲延長。
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const Header = ({ currentView, setView, user }) => (
            <header className="bg-yellow-400 border-b-4 border-yellow-600 sticky top-0 z-50">
                <div className="max-w-6xl mx-auto px-4 py-3 flex flex-wrap justify-between items-center">
                    <div className="flex items-center gap-2 cursor-pointer" onClick={() => setView('home')}>
                        <div className="bg-blue-800 text-white p-2 rounded-full border-2 border-white">
                            <i data-lucide="compass" className="w-6 h-6"></i>
                        </div>
                        <h1 className="text-xl md:text-2xl font-bold text-blue-900 title-font">日治臺灣：時光探險隊</h1>
                    </div>
                    <nav className="flex gap-2 flex-wrap mt-2 md:mt-0">
                        {['home', 'learn', 'game', 'quiz', 'dashboard'].map(view => (
                            <button
                                key={view}
                                onClick={() => setView(view)}
                                className={`px-3 py-1 rounded-lg font-bold text-sm transition-colors ${
                                    currentView === view 
                                    ? 'bg-blue-800 text-white shadow-inner' 
                                    : 'bg-yellow-100 text-yellow-800 hover:bg-yellow-200'
                                }`}
                            >
                                {view === 'home' ? '首頁' : 
                                 view === 'learn' ? '知識寶庫' : 
                                 view === 'game' ? '第一憨遊戲' : 
                                 view === 'quiz' ? '知識挑戰' : '成績紀錄'}
                            </button>
                        ))}
                    </nav>
                </div>
                {isOfflineMode && (
                    <div className="bg-gray-800 text-white text-xs text-center py-1">
                        ⚠️ 目前為本機模式：成績儲存在這台電腦，已啟用 Google Script 同步功能。
                    </div>
                )}
            </header>
        );

        const Login = ({ onJoin }) => {
            const [name, setName] = React.useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                if (name.trim()) onJoin(name);

                        {isBossQuestion && (
                            <div className="bg-red-500 text-white text-center py-1 font-bold animate-pulse">
                                ⚠️ 考卷大魔王出現了！請小心作答！
                            </div>
                        )}
                        <div className="p-6 md:p-8">
                            <h3 className="text-xl md:text-2xl font-bold text-gray-800 mb-8 leading-relaxed">
                                {q.type === 'tf' ? <span className="text-blue-500 mr-2">[是非題]</span> : <span className="text-green-500 mr-2">[選擇題]</span>}
                                {q.q}
                            </h3>

                            {!showFeedback ? (
                                <div className="grid gap-4">
                                    {q.type === 'tf' ? (
                                        <div className="grid grid-cols-2 gap-4">
                                            <button onClick={() => handleAnswer(true)} className="h-32 rounded-xl border-4 border-gray-100 hover:border-green-400 hover:bg-green-50 text-6xl font-black text-green-500 transition-all flex items-center justify-center">O</button>
                                            <button onClick={() => handleAnswer(false)} className="h-32 rounded-xl border-4 border-gray-100 hover:border-red-400 hover:bg-red-50 text-6xl font-black text-red-500 transition-all flex items-center justify-center">X</button>
                                        </div>
                                    ) : (
                                        q.options.map((opt, idx) => (
                                            <button key={idx} onClick={() => handleAnswer(idx)} className="p-4 rounded-xl border-2 border-gray-200 hover:border-blue-500 hover:bg-blue-50 text-left font-bold text-lg text-gray-700 transition-all">
                                                {idx + 1}. {opt}
                                            </button>
                                        ))
                                    )}
                                </div>
                            ) : (
                                <div className={`p-6 rounded-xl text-center animate-fade-in ${isCorrect ? 'bg-green-100' : 'bg-red-100'}`}>
                                    <div className="mb-4">
                                        {isCorrect ? (
                                            <i data-lucide="check-circle" className="w-16 h-16 text-green-600 mx-auto"></i>
                                        ) : (
                                            <i data-lucide="x-circle" className="w-16 h-16 text-red-600 mx-auto"></i>
                                        )}
                                    </div>
                                    <h4 className={`text-2xl font-black mb-2 ${isCorrect ? 'text-green-800' : 'text-red-800'}`}>
                                        {isCorrect ? '答對了！' : '答錯囉！'}
                                    </h4>
                                    <p className="text-gray-700 font-medium mb-6">{q.expl}</p>
                                    <button onClick={nextQuestion} className="bg-blue-900 text-white px-8 py-3 rounded-full font-bold retro-btn hover:bg-blue-800">
                                        下一題
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const Dashboard = ({ user }) => {
            const [scores, setScores] = React.useState([]);

            React.useEffect(() => {
                if (!user) return;
                
                // Firestore Compat Query
                const scoresRef = db.collection('artifacts')
                    .doc(appId)
                    .collection('public')
                    .doc('data')
                    .collection('scores');
                
                const q = scoresRef.orderBy('score', 'desc');

                const unsubscribe = q.onSnapshot((snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setScores(data);
                }, (error) => {
                    console.error("Error fetching scores:", error);
                });

                return () => unsubscribe();
            }, [user]);

            const exportCSV = () => {
                let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; // BOM for Chinese characters
                csvContent += "姓名,分數,作答時間\n";
                scores.forEach(row => {
                    const date = row.date ? new Date(row.date.seconds * 1000).toLocaleString() : 'N/A';
                    csvContent += `${row.name},${row.score},${date}\n`;
                });
                
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", "日治時期學習成績.csv");
                document.body.appendChild(link);
                link.click();
            };

            return (
                <div className="max-w-4xl mx-auto p-6">
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="text-2xl font-bold text-blue-900 title-font flex items-center gap-2">
                            <i data-lucide="bar-chart-2"></i> 學習英雄榜
                        </h2>
                        <button onClick={exportCSV} className="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg font-bold flex items-center gap-2 text-sm shadow-md">
                            <i data-lucide="download"></i> 匯出老師用成績表
                        </button>
                    </div>

                    <div className="bg-white rounded-xl shadow-lg overflow-hidden border border-gray-200">
                        <div className="overflow-x-auto">
                            <table className="w-full text-left">
                                <thead className="bg-blue-50 border-b border-blue-100">
                                    <tr>
                                        <th className="p-4 font-bold text-blue-900">排名</th>
                                        <th className="p-4 font-bold text-blue-900">姓名</th>
                                        <th className="p-4 font-bold text-blue-900">分數</th>
                                        <th className="p-4 font-bold text-blue-900 hidden md:table-cell">作答時間</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-gray-100">
                                    {scores.map((row, idx) => (
                                        <tr key={row.id} className={row.name === user ? "bg-yellow-50" : "hover:bg-gray-50"}>
                                            <td className="p-4 font-bold text-gray-500">
                                                {idx < 3 ? ['🥇', '🥈', '🥉'][idx] : idx + 1}
                                            </td>
                                            <td className="p-4 font-medium text-gray-800">
                                                {row.name} {row.name === user && <span className="text-xs bg-blue-600 text-white px-2 py-0.5 rounded-full ml-2">我</span>}
                                            </td>
                                            <td className="p-4 font-bold text-blue-600">{row.score}</td>
                                            <td className="p-4 text-sm text-gray-500 hidden md:table-cell">
                                                {row.date ? new Date(row.date.seconds * 1000).toLocaleString() : '剛剛'}
                                            </td>
                                        </tr>
                                    ))}
                                    {scores.length === 0 && (
                                        <tr>
                                            <td colSpan="4" className="p-8 text-center text-gray-500">目前還沒有人參加測驗喔！</td>
                                        </tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = React.useState(null);
            const [view, setView] = React.useState('home');

            // Firebase Auth
            React.useEffect(() => {
                const initAuth = async () => {
                    // Compat Auth
                    if (typeof initialAuthToken !== 'undefined' && initialAuthToken) {
                        await auth.signInWithCustomToken(initialAuthToken);
                    } else {
                        await auth.signInAnonymously();
                    }
                };
                initAuth();
                
                // Initialize icons
                if (window.lucide) window.lucide.createIcons();
            }, []);

            React.useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [view]);

            if (!user) {
                return <Login onJoin={setUser} />;
            }

            return (
                <div className="min-h-screen pb-12">
                    <Header currentView={view} setView={setView} user={user} />
                    <main className="mt-6">
                        {view === 'home' && <Home setView={setView} />}
                        {view === 'learn' && <Learn />}
                        {view === 'game' && <Game />}
                        {view === 'quiz' && <Quiz user={user} setView={setView} />}
                        {view === 'dashboard' && <Dashboard user={user} />}
                    </main>
                    <footer className="text-center text-gray-400 py-6 mt-8 border-t border-gray-200">
                        <p className="text-sm">五年級社會科輔助教材 © 2024</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
